# Copy to .github/workflows/ucp-digest.yml in your repository.
# Trigger: comment `/ucp digest` on an issue to post a structured UCP summary.
#
# Requires: public repo (or GITHUB_TOKEN with issues:write).

name: UCP issue digest

on:
  issue_comment:
    types: [created]

permissions:
  issues: write
  contents: read

jobs:
  digest:
    if: contains(github.event.comment.body, '/ucp digest')
    runs-on: ubuntu-latest
    steps:
      - name: Generate package
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pip install -q ucp-gen pyucp
          REF="${{ github.repository }}#${{ github.event.issue.number }}"
          ucp-gen github "$REF" -o /tmp/package.ucp.json

      - name: Render digest
        run: |
          python <<'PY'
          import json
          import ucp
          pkg = ucp.Package.model_validate(json.load(open("/tmp/package.ucp.json")))
          open("/tmp/digest.md", "w").write(pkg.render(token_budget=1200))
          PY

      - name: Post comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const md = fs.readFileSync('/tmp/digest.md', 'utf8');
            const body = [
              '### UCP digest',
              '',
              md,
              '',
              '---',
              '_Generated by [UCP](https://ucpcore.org/try) · [`ucp-gen`](https://pypi.org/project/ucp-gen/)_',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
